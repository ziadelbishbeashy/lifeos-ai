{% extends "base.html" %}

{% block content %}

<a href="{{ url_for('project_bp.project_details', project_id=project.id) }}">&larr; Back to Project</a>

<section class="form-section">
    <h2>Edit Project</h2>

    <form method="POST" class="project-form">
        <label>Project Title *</label>
        <input type="text" name="title" value="{{ project.title }}" required>

        <label>Project Type</label>
        <input type="text" name="project_type" value="{{ project.project_type or '' }}">

        <label>Description</label>
        <textarea name="description">{{ project.description or '' }}</textarea>

        <label>Goal</label>
        <textarea name="goal">{{ project.goal or '' }}</textarea>

        <label>Technology Stack</label>
        <input type="text" name="tech_stack" value="{{ project.tech_stack or '' }}">

        <label>Project Folder Path (optional)</label>
        <input type="text" name="project_folder" value="{{ project.project_folder or '' }}">

        <label>GitHub Link (optional)</label>
        <input type="url" name="github_link" value="{{ project.github_link or '' }}">

        <label>Demo Link (optional)</label>
        <input type="url" name="demo_link" value="{{ project.demo_link or '' }}">

        <label>Start Date</label>
        <input type="date" name="start_date" value="{{ project.start_date or '' }}">

        <label>Deadline</label>
        <input type="date" name="deadline" id="deadline-input" value="{{ project.deadline or '' }}" {% if not project.deadline %}disabled{% endif %}>

        <label class="checkbox-label">
            <input type="checkbox" name="no_deadline" id="no-deadline-checkbox" {% if not project.deadline %}checked{% endif %}>
            No Deadline
        </label>

        <label>Status</label>
        <select name="status">
            {% for option in ["Planning", "In Progress", "Completed", "Paused"] %}
                <option value="{{ option }}" {% if project.status == option %}selected{% endif %}>{{ option }}</option>
            {% endfor %}
        </select>

        <label>Priority</label>
        <select name="priority">
            {% for option in ["Low", "Medium", "High"] %}
                <option value="{{ option }}" {% if project.priority == option %}selected{% endif %}>{{ option }}</option>
            {% endfor %}
        </select>

        <label>Current Phase</label>
        <input type="text" name="current_phase" value="{{ project.current_phase or '' }}">

        <label>Progress %</label>
        <input type="number" name="progress" min="0" max="100" value="{{ project.progress or 0 }}">

        <button type="submit">Save Changes</button>
    </form>
</section>

{% endblock %}
